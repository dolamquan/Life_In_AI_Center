services:
  - type: web
    name: ai-tutor-backend
    env: node
    rootDir: backend
    buildCommand: npm ci && npx prisma generate && npx prisma db push && npx prisma db seed && npm run build
    startCommand: node dist/server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ai-tutor-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: CHROMA_URL
        sync: false
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        sync: false

databases:
  - name: ai-tutor-db
    databaseName: ai_tutor
    user: ai_tutor
    plan: free
